# aoos_fishcount — Deployment Site Configuration Template
# Copy to config/my_site.yaml and fill in site-specific values.
# Do NOT commit site configs (they contain coordinates and are .gitignored).

site:
  name: "Kwethluk River — Mile 12"        # Human-readable site identifier
  latitude: 60.123                         # Decimal degrees N
  longitude: -161.456                      # Decimal degrees W
  river_width_m: 3.2                       # Approximate river width at counting zone

camera:
  device_index: 0                          # /dev/video0 (CSI extender USB camera)
  width: 1920
  height: 1080
  fps: 30
  # Exposure control — tune for your site's light conditions.
  # See build guide Section 7.4 for rationale.
  exposure:
    auto_exposure: 3                       # 3 = auto mode
    exposure_value: -6                     # Slight underexposure to reduce glare
    white_balance_auto: false              # Lock WB to prevent flicker at dusk
    red_balance: 1400
    blue_balance: 1600

inference:
  model_path: "data/models/salmon_yolov8n_edgetpu.tflite"
  conf_threshold: 0.45                     # Tune after validation: raise to reduce FP,
                                           # lower to catch more fish
  line_y: 540                              # Set on-site: python scripts/calibrate_line.py
                                           # Y=0 is top of frame, Y=1079 is bottom.
  tracker: "bytetrack.yaml"
  # Adaptive confidence — automatically adjusts threshold by ambient light.
  # Set to null to use fixed conf_threshold for all conditions.
  adaptive_conf:
    bright_threshold: 0.50                 # Midday: raise to reduce FP from glare/debris
    dim_threshold: 0.35                    # Dusk/dawn: lower to catch more fish
    bright_level: 140
    dim_level: 60

logging:
  db_path: "data/counts/fishcount.db"
  log_dir: "data/logs"
  health_interval_minutes: 5              # Log BME280 readings every N minutes
  push_interval_minutes: 60              # Push count summary via Starlink every N min

push:
  endpoint: null                          # e.g. "https://dashboard.nalaquq.com/counts"
  dry_run: false
