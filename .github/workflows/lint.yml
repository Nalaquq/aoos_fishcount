name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff black mypy
      - name: ruff
        run: ruff check aoos_fishcount tests scripts
      - name: black
        run: black --check aoos_fishcount tests scripts
      - name: mypy
        run: mypy aoos_fishcount --ignore-missing-imports
